<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingressos Festa Junina</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9800,#ff5722);
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* bandeirinhas */

.bandeiras{
position:absolute;
top:0;
left:0;
width:100%;
height:60px;
background-image: repeating-linear-gradient(
45deg,
#ffeb3b 0px,
#ffeb3b 20px,
#4caf50 20px,
#4caf50 40px,
#2196f3 40px,
#2196f3 60px,
#f44336 60px,
#f44336 80px
);
clip-path: polygon(
0 0,100% 0,100% 70%,95% 100%,90% 70%,85% 100%,80% 70%,75% 100%,70% 70%,
65% 100%,60% 70%,55% 100%,50% 70%,45% 100%,40% 70%,35% 100%,30% 70%,
25% 100%,20% 70%,15% 100%,10% 70%,5% 100%,0 70%
);
}

/* card */

.container{
background:white;
padding:35px;
border-radius:15px;
width:100%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
margin-top:60px;
}

h1{
margin-bottom:25px;
}

/* campos */

label{
font-weight:bold;
margin-top:15px;
display:block;
}

input,select{
width:100%;
max-width:400px;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
display:block;
margin-left:auto;
margin-right:auto;
box-sizing:border-box;
}

.ingresso{
margin-top:10px;
}

/* total */

#total{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#e65100;
}

/* botão */

button{
margin-top:25px;
width:100%;
max-width:400px;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
background:#2e7d32;
color:white;
cursor:pointer;
transition:0.3s;
display:block;
margin-left:auto;
margin-right:auto;
}

button:hover{
background:#1b5e20;
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.footer{
margin-top:15px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="bandeiras"></div>

<div class="container">

<h1>🎉 Festa Junina</h1>

<label>Nome do comprador</label>
<input id="comprador" placeholder="Seu nome">

<label>Telefone</label>
<input id="telefone" placeholder="(xx) xxxxx-xxxx">

<label>Quantidade de ingressos</label>
<select id="quantidade">
<option value="1">1 ingresso</option>
<option value="2">2 ingressos</option>
<option value="3">3 ingressos</option>
<option value="4">4 ingressos</option>
<option value="5">5 ingressos</option>
</select>

<div id="nomes"></div>

<div id="total">Total: R$5</div>

<button onclick="enviar()">Reservar ingressos</button>

<div class="footer">
Ingresso: R$5 cada
</div>

</div>

<script>

const url = "https://default264c851fa4e743cf86bcd7b10dca85.78.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/9ea7436d9de2427c963539c85af82e62/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=3WPtT7ezmvxEFgLBN37FvBJV92ac3tcMh0txYhzB0sg"

const quantidade = document.getElementById("quantidade")
const container = document.getElementById("nomes")
const total = document.getElementById("total")

quantidade.addEventListener("change", atualizarCampos)

/* criar campos */

function atualizarCampos(){

container.innerHTML=""

let qtd = parseInt(quantidade.value)

for(let i=1;i<=qtd;i++){

let campo = document.createElement("input")
campo.placeholder="Nome do ingresso "+i
campo.className="ingresso"

container.appendChild(campo)

}

let valor=qtd*5
total.innerHTML="Total: R$"+valor

}

atualizarCampos()

/* mascara telefone */

const telefone=document.getElementById("telefone")

telefone.addEventListener("input",function(){

let v=this.value.replace(/\D/g,"")

if(v.length>11)v=v.slice(0,11)

if(v.length>6)
v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,"($1) $2-$3")
else if(v.length>2)
v=v.replace(/(\d{2})(\d{0,5})/,"($1) $2")

this.value=v

})

/* enviar */

async function enviar(){

let comprador=document.getElementById("comprador").value
let telefone=document.getElementById("telefone").value

let nomes=document.querySelectorAll(".ingresso")

let lista=[]

nomes.forEach(n=>{
lista.push(n.value)
})

const dados={
comprador:comprador,
telefone:telefone,
ingressos:lista
}

console.log(dados)

try{

await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(dados)
})

alert("Reserva enviada com sucesso!")

}catch(e){

console.error(e)
alert("Erro ao enviar")

}

}

</script>

</body>
</html>
