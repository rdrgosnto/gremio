<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingressos Festa Junina</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🎉 Festa Junina</h1>

<p>Compra de ingressos</p>

<label>Nome do comprador</label>
<input id="comprador" placeholder="Digite seu nome">

<label>Telefone</label>
<input id="telefone" placeholder="(00) 00000-0000">

<label>Quantidade de ingressos</label>
<select id="quantidade">
<option value="1">1 ingresso</option>
<option value="2">2 ingressos</option>
<option value="3">3 ingressos</option>
<option value="4">4 ingressos</option>
<option value="5">5 ingressos</option>
</select>

<div id="nomesIngressos"></div>

<div class="total">
Total: <span id="valor">R$5,00</span>
</div>

<button onclick="enviar()">Reservar ingressos</button>

</div>

<script src="script.js"></script>

</body>

</html>
