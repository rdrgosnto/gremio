<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grêmio | Ingressos Festa Junina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4a3b32;
            background-color: #e65100;
            background-image:
                linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.15) 75%, rgba(255, 255, 255, 0.15)),
                linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.15) 75%, rgba(255, 255, 255, 0.15));
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        .container {
            background-color: #fffdf7;
            padding: 40px 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
            border: 3px dashed #d84315;
            position: relative;
        }

        h1 {
            margin-top: 10px;
            margin-bottom: 25px;
            font-family: 'Amatic SC', cursive;
            font-size: 52px;
            font-weight: 700;
            color: #bf360c;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #ffcc80;
        }

        label {
            font-weight: 600;
            margin-top: 20px;
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-size: 14px;
            color: #5d4037;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            margin-top: 0;
            border-radius: 8px;
            border: 2px dashed #bcaaa4;
            font-size: 15px;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            color: #3e2723;
            background-color: transparent;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #d84315;
            border-style: solid;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(216, 67, 21, 0.1);
        }

        .ingresso { margin-top: 12px; }

        #total {
            margin-top: 30px;
            padding: 15px;
            border-radius: 8px;
            background-color: #ffcc80;
            border: 2px dashed #e65100;
            font-size: 22px;
            font-weight: 700;
            color: #bf360c;
            min-height: 33px;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #2e7d32;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px dashed #a5d6a7;
            box-shadow: 0 6px 0 #1b5e20;
        }

        button:disabled {
            background-color: #888 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: translateY(4px);
        }

        .footer {
            margin-top: 25px;
            font-size: 13px;
            font-weight: 600;
            color: #8d6e63;
        }

        .mensagem-sucesso {
            color: white;
            font-family: 'Amatic SC', cursive;
            font-size: 60px;
            font-weight: bold;
            text-align: center;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.5);
            line-height: 1.2;
        }
    </style>
</head>

<body>

    <div class="container" id="caixa-principal">
        <h1>Festa Junina</h1>

        <label>Nome do comprador</label>
        <input id="comprador" placeholder="Digite seu nome completo">

        <label>Telefone</label>
        <input id="telefone" placeholder="(xx) xxxxx-xxxx">

        <label>Quantidade de ingressos</label>
        <select id="quantidade">
            <option value="1">1 ingresso</option>
            <option value="2">2 ingressos</option>
            <option value="3">3 ingressos</option>
            <option value="4">4 ingressos</option>
            <option value="5">5 ingressos</option>
        </select>

        <div id="nomes"></div>

        <div id="total">Aguardando dados...</div>

        <button id="btn-acao" onclick="fluxoBotao()">Consultar Valor</button>

        <div class="footer" id="info-lote">
            Preencha os dados acima para verificar o lote atual.
        </div>
    </div>

    <script>
        const url = "SUA_URL_DO_POWER_AUTOMATE_AQUI";

        const quantidadeInput = document.getElementById("quantidade");
        const containerNomes = document.getElementById("nomes");
        const totalDiv = document.getElementById("total");
        const botaoAcao = document.getElementById("btn-acao");
        const caixaPrincipal = document.getElementById("caixa-principal");
        const infoLote = document.getElementById("info-lote");

        let etapaCompra = 1; // 1: Consultar, 2: Comprar
        let precoUnitarioConfirmado = 0;

        // Ao carregar, verifica se voltou do pagamento aprovado
        window.onload = function () {
            const parametros = new URLSearchParams(window.location.search);
            const status = parametros.get("collection_status");

            if (status === "approved") {
                caixaPrincipal.style.display = "none";
                const divMensagem = document.createElement("div");
                divMensagem.className = "mensagem-sucesso";
                divMensagem.innerHTML = "Êta trem bão!<br>Pagamento Aprovado!<br><span style='font-size: 35px; font-family: Poppins, sans-serif;'>Nos encontramos na festa!</span>";
                document.body.appendChild(divMensagem);
            }
            atualizarCampos();
        };

        quantidadeInput.addEventListener("change", () => {
            resetarBotao();
            atualizarCampos();
        });

        function atualizarCampos() {
            containerNomes.innerHTML = "";
            let qtd = parseInt(quantidadeInput.value);
            for (let i = 1; i <= qtd; i++) {
                let campo = document.createElement("input");
                campo.placeholder = "Nome do ingresso " + i;
                campo.className = "ingresso";
                containerNomes.appendChild(campo);
            }
        }

        function resetarBotao() {
            etapaCompra = 1;
            botaoAcao.innerText = "Consultar Valor";
            botaoAcao.style.background = "#2e7d32";
            botaoAcao.style.boxShadow = "0 6px 0 #1b5e20";
            totalDiv.innerHTML = "Aguardando consulta...";
            infoLote.innerText = "Preencha os dados acima para verificar o lote atual.";
        }

        async function fluxoBotao() {
            if (etapaCompra === 1) {
                await consultarLote();
            } else {
                await gerarPagamento();
            }
        }

        async function consultarLote() {
            const comprador = document.getElementById("comprador").value.trim();
            const tel = document.getElementById("telefone").value.trim();
            const ingressos = document.querySelectorAll(".ingresso");

            // Validação simples
            if (comprador === "" || tel === "") {
                alert("Preencha nome e telefone primeiro!");
                return;
            }

            botaoAcao.disabled = true;
            botaoAcao.innerText = "Verificando...";

            try {
                // Chamada ao Power Automate enviando a 'acao'
                const resposta = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        acao: "consultar",
                        quantidade: ingressos.length 
                    })
                });

                const resultado = await resposta.json();

                if (resultado.precoUnitario) {
                    precoUnitarioConfirmado = resultado.precoUnitario;
                    let valorTotal = precoUnitarioConfirmado * ingressos.length;

                    totalDiv.innerHTML = "Total: R$" + valorTotal;
                    infoLote.innerText = "Lote verificado! R$ " + precoUnitarioConfirmado + " por ingresso.";
                    
                    // Transição para etapa de compra
                    etapaCompra = 2;
                    botaoAcao.innerText = "Confirmar e Pagar";
                    botaoAcao.style.background = "#d84315"; // Laranja forte
                    botaoAcao.style.boxShadow = "0 6px 0 #bf360c";
                    botaoAcao.disabled = false;
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("Erro ao consultar lote. Tente novamente.");
                resetarBotao();
                botaoAcao.disabled = false;
            }
        }

        async function gerarPagamento() {
            let comprador = document.getElementById("comprador").value.trim();
            let tel = document.getElementById("telefone").value.trim();
            let ingressos = document.querySelectorAll(".ingresso");
            let listaNomes = Array.from(ingressos).map(i => i.value.trim());

            if (listaNomes.some(nome => nome === "")) {
                alert("Preencha todos os nomes nos ingressos!");
                return;
            }

            botaoAcao.innerText = "Gerando Pix...";
            botaoAcao.disabled = true;

            const dados = {
                acao: "comprar", // Diferencia a ação no Power Automate
                comprador: comprador,
                telefone: tel,
                ingressos: listaNomes,
                quantidade: ingressos.length
            };

            try {
                const resposta = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(dados)
                });

                const resultado = await resposta.json();

                if (resultado.link) {
                    window.location.href = resultado.link;
                } else {
                    alert("Erro ao gerar link de pagamento.");
                    resetarBotao();
                    botaoAcao.disabled = false;
                }
            } catch (e) {
                alert("Erro na conexão.");
                resetarBotao();
                botaoAcao.disabled = false;
            }
        }

        // Mascará de telefone
        document.getElementById("telefone").addEventListener("input", function () {
            let v = this.value.replace(/\D/g, "");
            if (v.length > 11) v = v.slice(0, 11);
            if (v.length > 6) v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, "($1) $2-$3");
            else if (v.length > 2) v = v.replace(/(\d{2})(\d{0,5})/, "($1) $2");
            this.value = v;
        });
    </script>
</body>
</html>
