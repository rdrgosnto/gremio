<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grêmio | Ingressos Festa Junina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
/* Usando a fonte Poppins */
font-family: 'Poppins', sans-serif;
background: linear-gradient(135deg,#ff9800,#ff5722);
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color: #333;
}

.container{
background:white;
/* Aumentei o padding para dar mais espaço (respiro) */
padding: 40px 30px;
/* Bordas mais arredondadas */
border-radius: 20px;
width:100%;
max-width: 420px;
/* Sombra mais suave e espalhada (aspecto flutuante) */
box-shadow: 0 10px 40px rgba(0,0,0,0.1);
text-align:center;
box-sizing: border-box;
}

h1{
margin-top: 0;
margin-bottom: 25px;
font-weight: 700;
font-size: 28px;
color: #e65100; /* Laranja escuro para o título */
}

label{
font-weight: 600; /* Semibold */
margin-top: 20px;
display:block;
text-align:left;
margin-bottom: 5px;
font-size: 14px;
color: #555; /* Cinza ligeiramente mais claro para labels */
}

input, select{
width:100%;
/* Padding mais alto para campos mais "gordinhos" */
padding: 14px 16px;
margin-top: 0;
/* Bordas mais arredondadas para combinar com o card */
border-radius: 12px;
/* Borda cinza muito suave */
border: 1px solid #e0e0e0;
font-size: 15px;
box-sizing:border-box;
font-family: 'Poppins', sans-serif; /* Garante que a fonte seja usada nos inputs */
color: #333;
background-color: #fcfcfc; /* Fundo do input quase branco */
transition: all 0.3s ease; /* Transição suave para efeitos */
}

/* EFEITO AO CLICAR NOS CAMPOS (FOCUS) */
input:focus, select:focus{
outline: none; /* Remove a borda azul padrão */
border-color: #ff9800; /* Muda borda para o laranja */
box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1); /* Adiciona sombra laranja muito suave */
background-color: #fff; /* Fundo totalmente branco ao focar */
}

/* Placeholder ligeiramente mais claro */
input::placeholder{
color: #a0a0a0;
}

.ingresso{
margin-top: 12px;
}

/* CAIXINHA DE DESTAQUE PARA O TOTAL */
#total{
margin-top: 30px;
padding: 15px;
border-radius: 12px;
background-color: #fef0e0; /* Fundo laranja muito suave */
border: 1px solid #fee6cc; /* Borda laranja ainda mais suave */
font-size: 24px;
font-weight: 700;
color: #e65100;
}

button{
margin-top: 30px;
width:100%;
padding: 16px;
border:none;
/* Bordas mais arredondadas */
border-radius: 12px;
font-size: 16px;
font-weight: 600; /* Semibold */
text-transform: uppercase; /* Letras maiúsculas para o botão */
letter-spacing: 0.5px; /* Espaçamento ligeiro entre letras */
background-color: #2e7d32;
color:white;
cursor:pointer;
transition: all 0.3s ease; /* Transição suave */
box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2); /* Sombra verde suave no botão */
}

button:hover{
background-color: #1b5e20;
/* Pequeno efeito de elevação */
transform: translateY(-2px);
box-shadow: 0 6px 15px rgba(46, 125, 50, 0.3); /* Aumenta sombra no hover */
}

/* Efeito ao clicar (active) */
button:active{
transform: translateY(0);
box-shadow: 0 2px 6px rgba(46, 125, 50, 0.2);
}

.footer{
margin-top: 25px;
font-size: 12px;
color: #888;
}

</style>
</head>

<body>

<div class="container">

<h1>Festa Junina</h1>

<label>Nome do comprador</label>
<input id="comprador" placeholder="Digite seu nome completo">

<label>Telefone</label>
<input id="telefone" placeholder="(xx) xxxxx-xxxx">

<label>Quantidade de ingressos</label>
<select id="quantidade">
<option value="1">1 ingresso</option>
<option value="2">2 ingressos</option>
<option value="3">3 ingressos</option>
<option value="4">4 ingressos</option>
<option value="5">5 ingressos</option>
</select>

<div id="nomes"></div>

<div id="total">Total: R$5</div>

<button onclick="gerarPix()">pagamento</button>

<div class="footer">
Valor unitário: R$5
</div>

</div>

<script>

// Mantenha sua URL do Power Automate aqui
const url="https://default264c851fa4e743cf86bcd7b10dca85.78.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9ea7436d9de2427c963539c85af82e62/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=3WPtT7ezmvxEFgLBN37FvBJV92ac3tcMh0txYhzB0sg"

const quantidade=document.getElementById("quantidade")
const container=document.getElementById("nomes")
const total=document.getElementById("total")
const botao = document.querySelector("button")

// LÓGICA DE VERIFICAÇÃO VISUAL DE RETORNO DO MERCADO PAGO
window.onload = function() {
    const parametros = new URLSearchParams(window.location.search);
    const status = parametros.get("collection_status");

    if (status === "approved") {
        // Esconde a caixinha branca principal
        document.querySelector(".container").style.display = "none";

        // Cria a mensagem de sucesso
        const divMensagem = document.createElement("div");
        divMensagem.innerHTML = "Obrigado<br>Nos encontramos na festa!";
        divMensagem.style.color = "white";
        divMensagem.style.fontWeight = "bold";
        divMensagem.style.fontSize = "32px";
        divMensagem.style.textAlign = "center";
        
        // Adiciona a mensagem na tela
        document.body.appendChild(divMensagem);
    }
}

quantidade.addEventListener("change",atualizarCampos)

function atualizarCampos(){

container.innerHTML=""

let qtd=parseInt(quantidade.value)

for(let i=1;i<=qtd;i++){

let campo=document.createElement("input")
campo.placeholder="Nome do ingresso "+i
campo.className="ingresso"

container.appendChild(campo)

}

let valor=qtd*5
total.innerHTML="Total: R$"+valor

}

atualizarCampos()

/* mascara telefone */

const telefone=document.getElementById("telefone")

telefone.addEventListener("input",function(){

let v=this.value.replace(/\D/g,"")

if(v.length>11)v=v.slice(0,11)

if(v.length>6)
v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,"($1) $2-$3")
else if(v.length>2)
v=v.replace(/(\d{2})(\d{0,5})/,"($1) $2")

this.value=v

})

async function gerarPix(){

let comprador=document.getElementById("comprador").value.trim()
let telefone=document.getElementById("telefone").value.trim()
let nomes=document.querySelectorAll(".ingresso")

if(comprador===""){
alert("Digite o nome do comprador")
return
}

if(telefone===""){
alert("Digite o telefone")
return
}

let lista=[]

for(let i=0;i<nomes.length;i++){

let nome=nomes[i].value.trim()

if(nome===""){
alert("Preencha o nome do ingresso "+(i+1))
return
}

lista.push(nome)

}

const dados={
comprador:comprador,
telefone:telefone,
ingressos:lista,
quantidade: nomes.length 
}

// Muda o botão para evitar cliques duplos e indicar carregamento
botao.innerText = "Aguarde...";
botao.disabled = true;
botao.style.background = "#888";
botao.style.boxShadow = "none";

try{

const resposta=await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(dados)
})

const resultado=await resposta.json()

if(resultado.link){
window.location.href=resultado.link
}else{
alert("Houve um erro ao gerar o pagamento. Tente novamente.")
restaurarBotao();
}

}catch(e){

alert("Erro ao gerar pagamento")
restaurarBotao();

}

}

function restaurarBotao() {
    // Volta o botão ao normal em caso de erro
    botao.innerText = "prosseguir para pagamento";
    botao.disabled = false;
    botao.style.background = "#2e7d32";
    botao.style.boxShadow = "0 4px 12px rgba(46, 125, 50, 0.2)";
}

</script>

</body>
</html>
