<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingressos Festa Junina</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎉 Festa Junina</h1>
<p>Compre seus ingressos</p>
</header>

<main>

<div class="card">

<label>Nome</label>
<input type="text" id="nome" placeholder="Seu nome">

<label>Telefone</label>
<input type="tel" id="telefone" placeholder="(00) 00000-0000">

<label>Quantidade de ingressos</label>
<select id="quantidade">
<option value="1">1 ingresso</option>
<option value="2">2 ingressos</option>
<option value="3">3 ingressos</option>
<option value="4">4 ingressos</option>
<option value="5">5 ingressos</option>
</select>

<div class="total">
Total: <span id="valor">R$5,00</span>
</div>

<button id="comprar">Comprar com PIX</button>

</div>

<div id="resultado" class="resultado oculto">
<h2>Pagamento</h2>
<p>Aqui aparecerá o link ou QR Code do PIX.</p>
</div>

</main>

<footer>
<p>Organização da Festa Junina</p>
</footer>

<script src="script.js"></script>

</body>
</html>
