<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingressos Festa Junina</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff9800,#ff5722);
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:100%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.ingresso{
margin-top:10px;
}

#total{
margin-top:15px;
font-size:20px;
font-weight:bold;
text-align:center;
color:#e65100;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
background:#2e7d32;
color:white;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1b5e20;
}

.footer{
margin-top:10px;
font-size:12px;
text-align:center;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>🎉 Festa Junina</h1>

<label>Nome do comprador</label>
<input id="comprador" placeholder="Seu nome">

<label>Telefone</label>
<input id="telefone" placeholder="(xx) xxxxx-xxxx">

<label>Quantidade de ingressos</label>
<select id="quantidade">
<option value="1">1 ingresso</option>
<option value="2">2 ingressos</option>
<option value="3">3 ingressos</option>
<option value="4">4 ingressos</option>
<option value="5">5 ingressos</option>
</select>

<div id="nomes"></div>

<div id="total">Total: R$5</div>

<button onclick="enviar()">Reservar ingressos</button>

<div class="footer">
Ingresso: R$5 cada
</div>

</div>

<script>

const url = "https://default264c851fa4e743cf86bcd7b10dca85.78.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/9ea7436d9de2427c963539c85af82e62/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=3WPtT7ezmvxEFgLBN37FvBJV92ac3tcMh0txYhzB0sg"

const quantidade = document.getElementById("quantidade")
const container = document.getElementById("nomes")
const total = document.getElementById("total")

quantidade.addEventListener("change", atualizarCampos)

function atualizarCampos(){

container.innerHTML=""

let qtd = parseInt(quantidade.value)

for(let i=1;i<=qtd;i++){

let campo = document.createElement("input")
campo.placeholder = "Nome do ingresso "+i
campo.className = "ingresso"

container.appendChild(campo)

}

let valor = qtd*5
total.innerHTML = "Total: R$"+valor

}

atualizarCampos()

async function enviar(){

let comprador=document.getElementById("comprador").value
let telefone=document.getElementById("telefone").value

let nomes=document.querySelectorAll(".ingresso")

let lista=[]

nomes.forEach(n=>{
lista.push(n.value)
})

const dados={
comprador:comprador,
telefone:telefone,
ingressos:lista
}

console.log(dados)

try{

await fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(dados)
})

alert("Reserva enviada com sucesso!")

}catch(e){

console.error(e)
alert("Erro ao enviar")

}

}

</script>

</body>
</html>
