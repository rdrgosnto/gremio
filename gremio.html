<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grêmio | Ingressos Festa Junina</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Poppins', sans-serif;
margin:0;
padding:20px;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color: #4a3b32; /* Marrom escuro rústico */

/* FUNDO XADREZ DE FESTA JUNINA FEITO EM CSS */
background-color: #e65100;
background-image: 
  linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.15) 75%, rgba(255, 255, 255, 0.15)), 
  linear-gradient(45deg, rgba(255, 255, 255, 0.15) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, 0.15) 75%, rgba(255, 255, 255, 0.15));
background-size: 40px 40px;
background-position: 0 0, 20px 20px;
}

.container{
background-color: #fffdf7; /* Fundo off-white (lembra papel manteiga/palha) */
padding: 40px 30px;
border-radius: 12px;
width:100%;
max-width: 420px;
box-shadow: 0 15px 35px rgba(0,0,0,0.4); /* Sombra mais forte para destacar do fundo xadrez */
text-align:center;
box-sizing: border-box;
/* Borda imitando costura */
border: 3px dashed #d84315; 
position: relative;
}

/* Detalhe de fita prendendo o card (Truque visual) */
.container::before {
content: "";
position: absolute;
top: -15px;
left: 50%;
transform: translateX(-50%);
width: 60px;
height: 30px;
background-color: rgba(255, 255, 255, 0.4);
box-shadow: 0 2px 5px rgba(0,0,0,0.1);
transform: translateX(-50%) rotate(-3deg);
}

h1{
margin-top: 10px;
margin-bottom: 25px;
font-family: 'Amatic SC', cursive; /* Fonte temática para o título */
font-size: 52px;
font-weight: 700;
color: #bf360c; /* Laranja queimado/barro */
letter-spacing: 2px;
text-shadow: 2px 2px 0px #ffcc80; /* Sombrinha para dar volume */
}

label{
font-weight: 600;
margin-top: 20px;
display:block;
text-align:left;
margin-bottom: 5px;
font-size: 14px;
color: #5d4037;
}

input, select{
width:100%;
padding: 12px 16px;
margin-top: 0;
border-radius: 8px;
/* Borda tracejada imitando costura grossa */
border: 2px dashed #bcaaa4;
font-size: 15px;
box-sizing:border-box;
font-family: 'Poppins', sans-serif;
color: #3e2723;
background-color: transparent;
transition: all 0.3s ease;
}

input:focus, select:focus{
outline: none;
border-color: #d84315; /* Costura fica laranja ao clicar */
border-style: solid; /* Fica sólida ao digitar */
background-color: #fff;
box-shadow: 0 0 0 3px rgba(216, 67, 21, 0.1);
}

input::placeholder{
color: #a1887f;
}

.ingresso{
margin-top: 12px;
}

#total{
margin-top: 30px;
padding: 15px;
border-radius: 8px;
background-color: #ffcc80; 
border: 2px dashed #e65100;
font-size: 24px;
font-weight: 700;
color: #bf360c;
}

button{
margin-top: 30px;
width:100%;
padding: 16px;
border-radius: 8px;
font-size: 18px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1px;
background-color: #2e7d32; /* Verde bandeira/folha */
color:white;
cursor:pointer;
transition: all 0.3s ease;
/* Borda pontilhada branca imitando costura no botão */
border: 2px dashed #a5d6a7;
box-shadow: 0 6px 0 #1b5e20; /* Efeito 3D de botão antigo */
}

button:hover{
background-color: #388e3c;
transform: translateY(2px);
box-shadow: 0 4px 0 #1b5e20; /* Afunda um pouco ao passar o mouse */
}

button:active{
transform: translateY(6px);
box-shadow: none; /* Afunda totalmente ao clicar */
}

.footer{
margin-top: 25px;
font-size: 13px;
font-weight: 600;
color: #8d6e63;
}

/* ESTILO DA MENSAGEM DE SUCESSO PARA COMBINAR COM O TEMA */
.mensagem-sucesso {
color: white;
font-family: 'Amatic SC', cursive;
font-size: 60px;
font-weight: bold;
text-align: center;
text-shadow: 3px 3px 5px rgba(0,0,0,0.5);
line-height: 1.2;
}

</style>
</head>

<body>

<div class="container" id="caixa-principal">

<h1>Festa Junina</h1>

<label>Nome do comprador</label>
<input id="comprador" placeholder="Digite seu nome completo">

<label>Telefone</label>
<input id="telefone" placeholder="(xx) xxxxx-xxxx">

<label>Quantidade de ingressos</label>
<select id="quantidade">
<option value="1">1 ingresso</option>
<option value="2">2 ingressos</option>
<option value="3">3 ingressos</option>
<option value="4">4 ingressos</option>
<option value="5">5 ingressos</option>
</select>

<div id="nomes"></div>

<div id="total">Total: R$5</div>

<button id="btn-gerar" onclick="gerarPix()">Comprar Ingresso</button>

<div class="footer">
Valor unitário: R$5
</div>

</div>

<script>

const url="https://default264c851fa4e743cf86bcd7b10dca85.78.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/9ea7436d9de2427c963539c85af82e62/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=3WPtT7ezmvxEFgLBN37FvBJV92ac3tcMh0txYhzB0sg"

const quantidade=document.getElementById("quantidade")
const containerNomes=document.getElementById("nomes")
const total=document.getElementById("total")
const botao = document.getElementById("btn-gerar")
const caixaPrincipal = document.getElementById("caixa-principal")

window.onload = function() {
    const parametros = new URLSearchParams(window.location.search);
    const status = parametros.get("collection_status");

    if (status === "approved") {
        caixaPrincipal.style.display = "none";

        const divMensagem = document.createElement("div");
        divMensagem.className = "mensagem-sucesso";
        divMensagem.innerHTML = "Êta trem bão!<br>Pagamento Aprovado!<br><span style='font-size: 35px; font-family: Poppins, sans-serif;'>Nos encontramos na festa!</span>";
        
        document.body.appendChild(divMensagem);
    }
}

quantidade.addEventListener("change",atualizarCampos)

function atualizarCampos(){
containerNomes.innerHTML=""
let qtd=parseInt(quantidade.value)

for(let i=1;i<=qtd;i++){
let campo=document.createElement("input")
campo.placeholder="Nome do ingresso "+i
campo.className="ingresso"
containerNomes.appendChild(campo)
}

let valor=qtd*5
total.innerHTML="Total: R$"+valor
}

atualizarCampos()

const telefone=document.getElementById("telefone")

telefone.addEventListener("input",function(){
let v=this.value.replace(/\D/g,"")
if(v.length>11)v=v.slice(0,11)
if(v.length>6) v=v.replace(/(\d{2})(\d{5})(\d{0,4})/,"($1) $2-$3")
else if(v.length>2) v=v.replace(/(\d{2})(\d{0,5})/,"($1) $2")
this.value=v
})

async function gerarPix(){
let comprador=document.getElementById("comprador").value.trim()
let tel=document.getElementById("telefone").value.trim()
let ingressos=document.querySelectorAll(".ingresso")

if(comprador===""){ alert("Digite o nome do comprador"); return }
if(tel===""){ alert("Digite o telefone"); return }

let lista=[]

for(let i=0;i<ingressos.length;i++){
let nome=ingressos[i].value.trim()
if(nome===""){ alert("Preencha o nome do ingresso "+(i+1)); return }
lista.push(nome)
}

const dados={
comprador:comprador,
telefone:tel,
ingressos:lista,
quantidade: ingressos.length 
}

botao.innerText = "Aguarde...";
botao.disabled = true;
botao.style.background = "#888";
botao.style.borderColor = "#666";
botao.style.boxShadow = "none";
botao.style.transform = "translateY(6px)";

try{
const resposta=await fetch(url,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(dados)
})

const resultado=await resposta.json()

if(resultado.link){
window.location.href=resultado.link
}else{
alert("Houve um erro ao gerar o pagamento. Tente novamente.")
restaurarBotao();
}

}catch(e){
alert("Erro ao gerar pagamento")
restaurarBotao();
}
}

function restaurarBotao() {
    botao.innerText = "Comprar Ingresso";
    botao.disabled = false;
    botao.style.background = "#2e7d32";
    botao.style.borderColor = "#a5d6a7";
    botao.style.transform = "translateY(0)";
    botao.style.boxShadow = "0 6px 0 #1b5e20";
}

</script>

</body>
</html>
